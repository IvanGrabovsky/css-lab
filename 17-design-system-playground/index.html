<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design System Playground — CSS Lab</title>
  <link rel="stylesheet" href="../shared.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="playground">
    <header class="playground-header">
      <h1>Design System Playground</h1>
      <p>A consolidation of modern CSS features into a cohesive design system.</p>
    </header>

    <section class="ds-section">
      <h2>Typography</h2>
      <div class="ds-grid">
        <div class="ds-card">
          <h1>Heading 1</h1>
          <h2>Heading 2</h2>
          <h3>Heading 3</h3>
          <p>Regular paragraph text using fluid typography settings.</p>
        </div>
      </div>
    </section>

    <section class="ds-section">
      <h2>Colors</h2>
      <div class="ds-color-grid">
        <div class="ds-color-box primary"></div>
        <div class="ds-color-box secondary"></div>
        <div class="ds-color-box surface"></div>
        <div class="ds-color-box background"></div>
      </div>
    </section>

    <section class="ds-section">
      <h2>Components</h2>
      <div class="ds-grid">
        <button class="ds-btn">Primary Button</button>
        <button class="ds-btn secondary">Secondary Button</button>
      </div>
    </section>
  </main>

  <nav class="module-nav">
    <a href="../16-command-palette/">← Command Palette</a>
    <a href="../index.html" class="all-modules">All Modules</a>
    <span></span>
  </nav>
</body>
</html>
