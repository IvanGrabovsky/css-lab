<html lang="en">
  <head>

    <title>Subgrid Demo</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Subgrid Demo</h1>

    <div class="cards">
      <article class="card">
        <h2>Short title</h2>
        <p>Small description.</p>
        <button>Read more</button>
      </article>

      <article class="card">

        </p>

        <button>Read more</button>
      </article>
    </div>
  </body>
