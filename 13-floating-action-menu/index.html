<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Floating Action Menu — CSS Lab</title>
  <link rel="stylesheet" href="../shared.css">
    <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
  <main class="app-container">
    <header class="app-header">
      <h1>Dashboard View</h1>
      <p>Click the Floating Action Button (FAB) in the bottom right.</p>
    </header>
    
    <div class="content-placeholder">
      <div class="card"></div>
      <div class="card"></div>
      <div class="card"></div>
    </div>

    <!-- Floating Action Menu Container -->
    <div class="fab-container">
      <input type="checkbox" id="fab-toggle" class="fab-checkbox" hidden>
      
      <!-- Primary Button (Anchor) -->
      <label for="fab-toggle" class="fab-button" aria-label="Toggle Actions">
        <span class="material-icons icon-add">add</span>
      </label>

      <!-- Action Menu (Positioned via Anchor Positioning) -->
      <nav class="fab-menu">
        <button class="fab-item" aria-label="Create Document" data-label="Document">
          <span class="material-icons">description</span>
        </button>
        <button class="fab-item" aria-label="Add Photo" data-label="Photo">
          <span class="material-icons">insert_photo</span>
        </button>
        <button class="fab-item" aria-label="Share" data-label="Share">
          <span class="material-icons">share</span>
        </button>
      </nav>
    </div>
</main>

    <nav class="module-nav">
      <a href="../12-responsive-pricing-cards/">← Responsive Pricing Cards</a>
      <a href="../index.html" class="all-modules">All Modules</a>
      <a href="../14-dashboard-widgets/">Dashboard Widgets →</a>
    </nav>
  </body>
</html>
