<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Adaptive Product Card — CSS Lab</title>
    <link rel="stylesheet" href="../shared.css">
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <h1>Adaptive Product Card</h1>

    <div class="wrapper">
      <article class="product">
        <!-- IMAGE -->
        <div class="image-wrap">
          <img
            src="https://picsum.photos/600/400"
            alt="Wireless headphones product image"
          />
        </div>

        <!-- CONTENT -->
        <div class="content">
          <div class="top-row">
            <span class="badge">🔥 Best seller</span>

            <!-- FIXED HEART CONTROL -->
            <label class="fav">
              <input type="checkbox" />
              <span class="heart">♡</span>
            </label>
          </div>

          <h2>Wireless Headphones Pro</h2>

          <div class="rating">
            <span class="stars">★★★★★</span>
            <span class="score">(4.9)</span>
          </div>

          <p>Premium sound quality with modern adaptive CSS layout.</p>

          <div class="price">
            <span class="new">$129</span>
            <span class="old">$199</span>
          </div>

          <button>Buy now</button>
        </div>
      </article>
    </div>

    <nav class="module-nav">
      <a href="../07-anchor-positioning/">← Anchor Positioning</a>
      <a href="../index.html" class="all-modules">All Modules</a>
      <a href="../09-dashboard-layout/">Dashboard Layout →</a>
    </nav>
  </body>
</html>
