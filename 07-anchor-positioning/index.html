<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>07 Anchor Positioning</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <h1>Anchor Positioning Lab</h1>

    <div class="panel">
      <!-- ANCHOR 1 -->
      <button class="btn" id="btn">Hover me</button>

      <div class="tooltip">I am anchored tooltip</div>

      <!-- ANCHOR 2 -->
      <div class="input-wrap">
        <input placeholder="Type something..." />

        <div class="hint">I follow input position</div>
      </div>

      <!-- ANCHOR 3 -->
      <div class="card">
        <h2>Product Card</h2>
        <p>Hover to see action bar</p>

        <div class="actions">Add · Save · Share</div>
      </div>
    </div>
  
    <div class="back-link">
      <a href="../index.html">← Back to Labs</a>
    </div>
  </body>
</html>
