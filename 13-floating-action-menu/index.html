<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Floating Action Menu</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
  <main class="app-container">
    <header class="app-header">
      <h1>Dashboard View</h1>
      <p>Click the Floating Action Button (FAB) in the bottom right.</p>
    </header>
    
    <div class="content-placeholder">
      <div class="card"></div>
      <div class="card"></div>
      <div class="card"></div>
    </div>

    <!-- Floating Action Menu Container -->
    <div class="fab-container">
      <input type="checkbox" id="fab-toggle" class="fab-checkbox" hidden>
      
      <!-- Primary Button (Anchor) -->
      <label for="fab-toggle" class="fab-button" aria-label="Toggle Actions">
        <span class="material-icons icon-add">add</span>
      </label>

      <!-- Action Menu (Positioned via Anchor Positioning) -->
      <nav class="fab-menu">
        <button class="fab-item" aria-label="Create Document">
          <span class="material-icons">description</span>
          <span class="fab-tooltip">Document</span>
        </button>
        <button class="fab-item" aria-label="Add Photo">
          <span class="material-icons">insert_photo</span>
          <span class="fab-tooltip">Photo</span>
        </button>
        <button class="fab-item" aria-label="Share">
          <span class="material-icons">share</span>
          <span class="fab-tooltip">Share</span>
        </button>
      </nav>
    </div>
    
    <div class="back-link">
      <a href="../index.html">← Back to Labs</a>
    </div>
  </main>
</body>
</html>
